<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Kinder Upcoming Events</title>

    <!-- Libraries (CDN) -->
    <!-- iCal parser -->
    <script src="https://cdn.jsdelivr.net/npm/ical.js@1.4.0/build/ical.min.js"></script>
    <!-- QR code generator -->
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>

    <style>
      :root{
  --bg1:#03849c;
  --bg2:#03849c;

  --card:#f6f2ea;

  --ink:#4b216c;
  --muted:#6a4a82;

  --accent:#4b216c;
  --accent2:#4b216c;

  --shadow: 0 10px 30px rgba(0,0,0,.18);
  --radius: 18px;
}

.logoRow{
  display:flex;
  align-items:center;
  gap:14px;
}

.logo{
  height:70px;
  width:auto;
  border-radius:8px;
  background:white;
  padding:4px;
}

      *{box-sizing:border-box}
      body{
        margin:0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
        color:var(--ink);
        background:
  radial-gradient(900px 500px at 20% 10%, rgba(255,255,255,.15), transparent 60%),
  radial-gradient(700px 400px at 90% 40%, rgba(255,255,255,.12), transparent 60%),
  linear-gradient(160deg, #03849c 0%, #03849c 40%, #026d82 100%);
        min-height:100vh;
        padding:24px;
      }

      .page{
        max-width: 860px;
        margin: 0 auto;
      }

      .sheet{
        background: rgba(255,255,255,.06);
        border: 1px solid rgba(255,255,255,.18);
        border-radius: 24px;
        padding: 22px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(6px);
      }

      header{
        display:flex;
        align-items:flex-start;
        justify-content:space-between;
        gap:18px;
      }

      .brand{
        display:flex;
        flex-direction:column;
        gap:10px;
      }

      .badge{
        display:inline-flex;
        align-items:center;
        gap:10px;
        padding:10px 14px;
        border-radius: 999px;
        background: rgba(0,0,0,.18);
        color: rgba(255,255,255,.92);
        font-weight:700;
        letter-spacing:.3px;
        width: fit-content;
      }

      .titleBox{
        background: var(--card);
        border-radius: 20px;
        padding: 14px 18px;
        border: 1px solid rgba(0,0,0,.06);
      }
      h1{
        margin:0;
        font-size: 34px;
        line-height: 1.05;
        letter-spacing: -0.6px;
      }
      .subtitle{
        margin:6px 0 0;
        color: var(--muted);
        font-weight:600;
      }

      .qrWrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  padding:18px;
  border-radius:18px;
  background:rgba(255,255,255,.14);
  border:1px solid rgba(255,255,255,.22);
}
     #qr{
  width:188px;
  height:188px;
  background:white;
  padding:14px;
  border-radius:14px;
}
      .qrText{
        font-size: 12px;
        color: rgba(255,255,255,.95);
        text-align:center;
        font-weight:700;
        line-height:1.15;
      }

      .sectionTitle{
        margin:18px 0 10px;
        padding: 10px 14px;
        border-radius: 16px;
        background: rgba(255,255,255,.16);
        color: rgba(255,255,255,.92);
        font-weight:800;
        letter-spacing:.5px;
        text-transform: uppercase;
        font-size: 13px;
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:10px;
      }

      .controls{
        display:flex;
        gap:8px;
        flex-wrap: wrap;
      }

      button{
        border:0;
        border-radius: 999px;
        padding: 10px 12px;
        font-weight:800;
        cursor:pointer;
        background: rgba(255,255,255,.92);
        color: var(--ink);
      }
      button.secondary{
        background: rgba(0,0,0,.18);
        color: rgba(255,255,255,.92);
        border: 1px solid rgba(255,255,255,.25);
        box-shadow: none;
      }
      button:disabled{
        opacity:.5;
        cursor:not-allowed;
      }

      .list{
        display:flex;
        flex-direction:column;
        gap:12px;
      }

      .eventCard{
        display:flex;
        gap:14px;
        align-items:stretch;
        background: var(--card);
        border-radius: var(--radius);
        padding: 12px 14px;
        border: 1px solid rgba(0,0,0,.06);
      }

      .datePill{
        width:92px;
        flex: 0 0 92px;
        border-radius: 16px;
        background: linear-gradient(180deg, rgba(61,111,182,.18), rgba(61,111,182,.06));
        border: 1px solid rgba(61,111,182,.22);
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        padding: 10px 8px;
        text-align:center;
      }

      .mon{
        font-weight:900;
        letter-spacing: 2px;
        font-size: 12px;
        color: var(--accent2);
      }
      .day{
        font-weight:950;
        font-size: 34px;
        line-height: 1;
        margin-top: 3px;
      }
      .time{
        margin-top: 6px;
        font-weight:800;
        font-size: 12px;
        color: var(--muted);
      }

      .eventMain{
        flex:1;
        min-width: 0;
        display:flex;
        flex-direction:column;
        justify-content:center;
      }
      .eventTitle{
        margin:0;
        font-size: 20px;
        font-weight:950;
        letter-spacing: -0.2px;
      }
      .eventCard { cursor: pointer; }

.eventDesc{
  margin: 5px 0 0;
  color: var(--muted);
  font-weight:650;
  overflow:hidden;
  display:-webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
}

.eventCard.expanded .eventDesc{
  overflow: visible;
  display: block;
  -webkit-line-clamp: unset;
  white-space: pre-wrap; /* keep line breaks from calendar */
}

.eventHint{
  margin-top: 8px;
  font-size: 12px;
  font-weight: 800;
  color: var(--accent);
  opacity: .9;
}

      .metaRow{
        margin-top: 8px;
        display:flex;
        gap:10px;
        flex-wrap:wrap;
        align-items:center;
        color: var(--muted);
        font-weight:700;
        font-size: 12px;
      }
      .chip{
        background: rgba(0,0,0,.06);
        border: 1px solid rgba(0,0,0,.06);
        padding: 6px 10px;
        border-radius: 999px;
      }
      .chip.urgent{
        background: rgba(182,74,58,.10);
        border-color: rgba(182,74,58,.18);
        color: #7d2f24;
      }

      .status{
        margin-top: 12px;
        color: rgba(255,255,255,.92);
        font-weight:800;
        font-size: 13px;
        display:flex;
        justify-content:space-between;
        gap:10px;
        flex-wrap:wrap;
      }

      a.link{
        color: rgba(255,255,255,.95);
        text-decoration: underline;
        font-weight:900;
      }

      /* Print: A5 friendly */
      @media print {
        body{
          background: white;
          padding: 0;
        }
        .sheet{
          box-shadow:none;
          border:none;
          backdrop-filter:none;
          background: white;
          padding: 0;
        }
        .sectionTitle, .status, .controls, button, .badge, .qrText a, .eventHint{
          display:none !important;
        }
        .eventCard{
          box-shadow: none;
          border: 2px solid var(--bg1);
        }
        .eventDesc{
          -webkit-line-clamp: 1;
        }
        .qrWrap{
          background: transparent;
          border:none;
        }
      }

      /* Mobile tweaks */
      @media (max-width: 560px){
        header{flex-direction:column; align-items:stretch;}
        .qrWrap{align-self:flex-end;}
        .eventCard{flex-direction:row;}
      }
    </style>
  </head>

  <body>
    <div class="page">
      <div class="sheet">
        <header>
  <div class="brand">

    <div class="logoRow">
      <img src="kinder-logo.jpg" class="logo" alt="Kallista Kindergarten logo">
      <div class="badge">KINDER • EVENTS</div>
    </div>

    <div class="titleBox">
      <h1 id="pageTitle">Kallista Kinder Upcoming Events</h1>
      <p class="subtitle" id="pageSubtitle">Next events pulled live from our public calendar</p>
    </div>

  </div>

  <div class="qrWrap">
    <div id="qr"></div>
    <div class="qrText">
      Subscribe<br>
      <a class="link" id="subscribeLink" href="#">Open calendar</a>
    </div>
  </div>
</header>

        <div class="sectionTitle">
          <span>Upcoming Event Dates</span>
          <div class="controls">
            <button class="secondary" id="prevBtn">Prev 5</button>
            <button class="secondary" id="nextBtn">Next 5</button>
            <button id="printBtn">Print</button>
          </div>
        </div>

        <div class="list" id="events"></div>

        <div class="status">
          <span id="statusText">Loading events…</span>
          <span>
            Sharing link:
            <a class="link" id="publicViewLink" href="#" target="_blank" rel="noreferrer">View online</a>
          </span>
        </div>
      </div>
    </div>

    <script>
      // =======================
      // CONFIG (edit these)
      // =======================
      const ICS_URL = "./calendar.ics";
      const SUBSCRIBE_URL =
        "https://calendar.google.com/calendar/u/0/r?cid=e22b74f5b0b5b1bb2dba879d3eff483eeadbbb95ebb18bc9ef7656df891c6427@group.calendar.google.com";
      const PAGE_TITLE = "Kallista Kinder Upcoming Events";
      const PAGE_SUBTITLE = "Next events pulled live from our public calendar";

      // Pagination
      const PAGE_SIZE = 5;

      // =======================
      // App state
      // =======================
      let allEvents = [];
      let pageIndex = 0;

      // UI refs
      const elEvents = document.getElementById("events");
      const elStatus = document.getElementById("statusText");
      const elPrev = document.getElementById("prevBtn");
      const elNext = document.getElementById("nextBtn");

      // Header links/text
      document.getElementById("pageTitle").textContent = PAGE_TITLE;
      document.getElementById("pageSubtitle").textContent = PAGE_SUBTITLE;

      const subscribeA = document.getElementById("subscribeLink");
      subscribeA.href = SUBSCRIBE_URL;

      const publicViewA = document.getElementById("publicViewLink");
      publicViewA.href = SUBSCRIBE_URL;

      // QR code
      new QRCode(document.getElementById("qr"), {
        text: SUBSCRIBE_URL,
        width: 160,
        height: 160,
        correctLevel: QRCode.CorrectLevel.M,
      });

      document.getElementById("printBtn").addEventListener("click", () => window.print());

      elPrev.addEventListener("click", () => {
        if (pageIndex > 0) {
          pageIndex--;
          render();
        }
      });
      elNext.addEventListener("click", () => {
        const maxPage = Math.floor((allEvents.length - 1) / PAGE_SIZE);
        if (pageIndex < maxPage) {
          pageIndex++;
          render();
        }
      });

      // =======================
      // Helpers
      // =======================
      function pad2(n) {
        return String(n).padStart(2, "0");
      }

      function formatMonthShort(d) {
        return d.toLocaleString(undefined, { month: "short" }).toUpperCase();
      }

      function formatTime(d, isAllDay) {
        if (isAllDay) return "All day";
        return d.toLocaleString(undefined, { hour: "numeric", minute: "2-digit" });
      }

      function cleanText(s) {
  if (!s) return "";

  // Remove HTML tags like <p>, <strong>, etc
  s = s.replace(/<[^>]*>/g, "");

  // Convert escaped line breaks
  s = s.replace(/\\n/g, "\n").replace(/\r/g, "");

  return s.trim();
}

      function isAllDayEvent(icalEvent) {
        // If DTSTART is date-only (no time), ical.js marks it as "isDate"
        const dt = icalEvent.startDate;
        return !!(dt && dt.isDate);
      }

      // =======================
      // Render
      // =======================
      function render() {
        const start = pageIndex * PAGE_SIZE;
        const slice = allEvents.slice(start, start + PAGE_SIZE);

        elEvents.innerHTML = "";

        if (!slice.length) {
          elEvents.innerHTML = `<div class="eventCard"><div class="eventMain"><h3 class="eventTitle">No upcoming events found</h3><p class="eventDesc">Try adding events to the calendar or check your feed.</p></div></div>`;
        }

        for (const ev of slice) {
          const mon = formatMonthShort(ev.start);
          const day = ev.start.getDate();
          const timeLabel = formatTime(ev.start, ev.allDay);

          const desc = ev.description || "";
          const loc = ev.location || "";

          const card = document.createElement("div");
          card.className = "eventCard";

          card.innerHTML = `
  <div class="datePill">
    <div class="mon">${mon}</div>
    <div class="day">${day}</div>
    <div class="time">${timeLabel}</div>
  </div>
  <div class="eventMain">
    <h3 class="eventTitle">${escapeHtml(ev.title)}</h3>
    <p class="eventDesc">${escapeHtml(desc)}</p>
    ${desc ? `<div class="eventHint">Tap to read more</div>` : ""}
    <div class="metaRow">
      ${loc ? `<span class="chip">📍 ${escapeHtml(loc)}</span>` : ""}
      <span class="chip">${escapeHtml(ev.dateRange)}</span>
    </div>
  </div>
`;
// Toggle expand/collapse on click (ignore clicks on links)
card.addEventListener("click", (e) => {
  if (e.target.closest("a")) return;
  card.classList.toggle("expanded");

  const hint = card.querySelector(".eventHint");
  if (hint) hint.textContent = card.classList.contains("expanded") ? "Tap to collapse" : "Tap to read more";
});
          elEvents.appendChild(card);
        }

        const maxPage = Math.max(0, Math.floor((allEvents.length - 1) / PAGE_SIZE));
        elPrev.disabled = pageIndex === 0;
        elNext.disabled = pageIndex >= maxPage;

        elStatus.textContent = allEvents.length
          ? `Showing ${Math.min(start + 1, allEvents.length)}–${Math.min(start + PAGE_SIZE, allEvents.length)} of ${allEvents.length} upcoming events`
          : "No upcoming events to show";
      }

      function escapeHtml(str) {
        return (str || "").replace(/[&<>"']/g, (m) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#39;"
        }[m]));
      }
async function fetchWithTimeout(url, ms = 12000) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), ms);

  try {
    const res = await fetch(url, { signal: ctrl.signal, cache: "no-store" });
    const text = await res.text();

    if (!res.ok) {
      throw new Error(`HTTP ${res.status}: ${text.slice(0, 120)}`);
    }
    if (!text.includes("BEGIN:VCALENDAR")) {
      throw new Error(`Not an ICS response: ${text.slice(0, 120)}`);
    }

    return text;
  } finally {
    clearTimeout(t);
  }
}

      // =======================
      // Load + parse ICS
      // =======================
 async function loadEvents() {
  try {
    elStatus.textContent = "Loading events…";

    // Fetch cached ICS from your own GitHub Pages (generated by GitHub Actions)
    const icsText = await fetchWithTimeout("./calendar.ics", 12000);

    // Parse only once we've confirmed it's an ICS
    const jcal = ICAL.parse(icsText);
    const comp = new ICAL.Component(jcal);
    const vevents = comp.getAllSubcomponents("vevent") || [];

    const now = new Date();
    const upcoming = [];

    for (const v of vevents) {
      const e = new ICAL.Event(v);

      // Recurring expansion (next 12 months)
      const iterator = e.iterator();
      let next;
      let safety = 0;

      while ((next = iterator.next()) && safety++ < 500) {
        const start = next.toJSDate();

        // Only future (or today)
        if (start < new Date(now.getTime() - 24 * 60 * 60 * 1000)) continue;

        // Stop expanding too far (12 months)
        const limit = new Date(now);
        limit.setMonth(limit.getMonth() + 12);
        if (start > limit) break;

        const details = e.getOccurrenceDetails(next);
        const occEvent = details.item;

        const allDay = isAllDayEvent(occEvent);

        const end = details.endDate.toJSDate();
        const title = cleanText(occEvent.summary);
        const description = cleanText(occEvent.description);
        const location = cleanText(occEvent.location);

        const dateRange = buildDateRange(start, end, allDay);

        upcoming.push({
          start,
          end,
          title: title || "(Untitled event)",
          description,
          location,
          allDay,
          dateRange,
        });

        // If not recurring, just take one
        if (!e.isRecurring()) break;
      }
    }

    upcoming.sort((a, b) => a.start - b.start);

    allEvents = upcoming;
    pageIndex = 0;
    render();
  } catch (err) {
    console.error(err);

    elStatus.textContent =
      "Couldn’t load events. The cached calendar file may not exist yet, or the last sync failed.";

    elEvents.innerHTML = `
      <div class="eventCard">
        <div class="eventMain">
          <h3 class="eventTitle">Couldn’t load events</h3>
          <p class="eventDesc">${escapeHtml(String(err.message || err))}</p>
          <p class="eventDesc">
            Make sure <strong>calendar.ics</strong> exists in the repo root.
            If you just set up the workflow, go to <strong>Actions → Update calendar feed → Run workflow</strong> once to generate it.
          </p>
        </div>
      </div>
    `;
  }
}
      function buildDateRange(start, end, allDay) {
  const dateFmt = { weekday: "short", year: "numeric", month: "short", day: "numeric" };

  if (allDay) {
    // Google ICS all-day events often have an "exclusive" DTEND (next day).
    // For display, treat end as inclusive by subtracting 1 day when it spans multiple days.
    const startDay = new Date(start.getFullYear(), start.getMonth(), start.getDate());
    const endDayExclusive = new Date(end.getFullYear(), end.getMonth(), end.getDate());

    const dayMs = 24 * 60 * 60 * 1000;
    const spanDays = Math.round((endDayExclusive - startDay) / dayMs);

    // Single-day all-day event
    if (spanDays <= 1) {
      return start.toLocaleDateString(undefined, dateFmt);
    }

    // Multi-day all-day event: end is exclusive -> show inclusive end
    const endInclusive = new Date(endDayExclusive.getTime() - dayMs);

    return `${start.toLocaleDateString(undefined, dateFmt)} \u2192 ${endInclusive.toLocaleDateString(undefined, dateFmt)}`;
  }

  // Timed event (your existing style)
  const d = start.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
  const t1 = start.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
  const t2 = end.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
  return `${d} \u2022 ${t1}\u2013${t2}`;
}

      loadEvents();
    </script>
  </body>
</html>
